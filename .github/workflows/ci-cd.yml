name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. TEST JOB: Ensure the code actually works
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn test

  # 2. BUILD AND PUSH JOB: Runs only if 'test' passes
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only push to Docker Hub on main branch commits
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # We use metadata-action to generate clean tags automatically
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/springboot-app
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package Application
        run: mvn clean package -DskipTests # Tests already passed in the previous job

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Uses the tags generated by the 'meta' step (latest + short SHA)
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}